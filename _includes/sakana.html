<div class="sakana-dock" aria-hidden="true">
  <div class="sakana-box"></div>
</div>

<script src="{{ '/assets/js/sakana.min.js' | relative_url }}"></script>
<script>
  window.addEventListener('load', function () {
    if (typeof Sakana === 'undefined' || !document.querySelector('.sakana-box')) return;

    Sakana.setMute(true);
    Sakana.init({
      el: '.sakana-box',
      character: 'takina',
      scale: 0.35,
      canSwitchCharacter: true
    });
  });
</script>
